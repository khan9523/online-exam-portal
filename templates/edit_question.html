{% extends "base.html" %}

{% block content %}

<h3>Edit Question</h3>

<form method="post">
    <input type="text" name="question" value="{{ q[1] }}" required><br><br>
    <input type="text" name="option_a" value="{{ q[2] }}" required><br><br>
    <input type="text" name="option_b" value="{{ q[3] }}" required><br><br>
    <input type="text" name="option_c" value="{{ q[4] }}" required><br><br>
    <input type="text" name="option_d" value="{{ q[5] }}" required><br><br>
    <input type="text" name="correct_option" value="{{ q[6] }}" required><br><br>
    <button type="submit">Update Question</button>
</form>

{% endblock %}
