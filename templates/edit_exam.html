{% extends "base.html" %}

{% block title %}Edit Exam{% endblock %}

{% block extra_css %}
<style>
    .form-container {
        max-width: 800px;
        margin: 30px auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    h2 {
        color: #667eea;
        margin-top: 0;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    label {
        display: block;
        font-weight: bold;
        margin-bottom: 8px;
        color: #333;
    }
    
    input[type="text"],
    input[type="number"],
    textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }
    
    textarea {
        resize: vertical;
        min-height: 80px;
    }
    
    input:focus,
    textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .form-actions {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }
    
    button {
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s;
    }
    
    .btn-submit {
        background: #27ae60;
        color: white;
        flex: 1;
    }
    
    .btn-submit:hover {
        background: #229954;
    }
    
    .btn-cancel {
        background: #95a5a6;
        color: white;
        flex: 1;
        text-decoration: none;
        text-align: center;
    }
    
    .btn-cancel:hover {
        background: #7f8c8d;
    }

    @media (max-width: 768px) {
        .form-container {
            margin: 16px auto;
            padding: 20px;
        }

        .form-actions {
            flex-direction: column;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Edit Exam</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="exam_name">Exam Name</label>
            <input type="text" name="exam_name" id="exam_name" value="{{ exam[1] }}" required>
        </div>
        
        <div class="form-group">
            <label for="description">Description</label>
            <textarea name="description" id="description">{{ exam[2] }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="duration_minutes">Duration (minutes)</label>
            <input type="number" name="duration_minutes" id="duration_minutes" value="{{ exam[3] }}" min="1" required>
        </div>
        
        <div class="form-group">
            <label for="passing_percentage">Passing Percentage (%)</label>
            <input type="number" name="passing_percentage" id="passing_percentage" value="{{ exam[4] }}" min="0" max="100" required>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn-submit">Update Exam</button>
            <a href="{{ url_for('manage_exams') }}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
