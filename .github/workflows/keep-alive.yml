name: Keep Render Service Awake

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response="$(curl -fsS \
            --max-time 120 \
            --retry 4 \
            --retry-delay 10 \
            --retry-all-errors \
            --connect-timeout 15 \
            https://online-exam-portal-6nxf.onrender.com/health)"

          echo "Health response: $response"
          echo "$response" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'
