services:
  - type: web
    name: online-exam-portal
    env: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_FILE_DIR
        value: /tmp/flask_session
