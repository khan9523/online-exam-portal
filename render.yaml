services:
  - type: web
    name: online-exam-portal
    env: python
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    disk:
      name: online-exam-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/exam.db
      - key: SESSION_FILE_DIR
        value: /var/data/flask_session
